presets:

  quality_compounder:
    name: Quality Compounder
    filters:
      return_on_equity_pct:
        min: 15
      debt_to_equity:
        max: 1.0
      free_cash_flow_cr:
        min: 0
      revenue_cagr_5yr_pct:
        min: 10

  value_pick:
    name: Value Pick
    filters:
      pe_ratio:
        max: 20
      pb_ratio:
        max: 3.0
      debt_to_equity:
        max: 2.0
      dividend_yield_pct:
        min: 1

  growth_accelerator:
    name: Growth Accelerator
    filters:
      pat_cagr_5yr_pct:
        min: 20
      revenue_cagr_5yr_pct:
        min: 15
      debt_to_equity:
        max: 2.0

  dividend_champion:
    name: Dividend Champion
    filters:
      dividend_yield_pct:
        min: 2
      dividend_payout_pct:
        max: 80
      free_cash_flow_cr:
        min: 0

  debt_free_blue_chip:
    name: Debt-Free Blue Chip
    filters:
      debt_to_equity:
        max: 0
      return_on_equity_pct:
        min: 12
      sales:
        min: 5000

  turnaround_watch:
    name: Turnaround Watch
    filters:
      revenue_cagr_3yr_pct:
        min: 10
      free_cash_flow_cr:
        min: 0